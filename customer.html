<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>바자회 주문하기</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
      background: #f5f0ea;
      color: #1a1a1a;
      font-size: 18px;
      line-height: 1.75;
      padding-bottom: 140px;
    }

    /* ── 헤더 ── */
    .header {
      background: #b03a2e;
      color: #fff;
      padding: 20px 18px 16px;
      text-align: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }
    .header-title {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .header-sub {
      font-size: 16px;
      color: rgba(255,255,255,0.82);
    }

    /* ── 운영 상태 배너 ── */
    .status-banner {
      padding: 15px 20px;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      line-height: 1.5;
    }
    .s-open   { background: #e8f5e9; color: #1b5e20; border-bottom: 3px solid #43a047; }
    .s-paused { background: #fff8e1; color: #bf360c; border-bottom: 3px solid #fb8c00; }
    .s-closed { background: #fce4ec; color: #880e4f; border-bottom: 3px solid #d81b60; }

    .wrap { max-width: 580px; margin: 0 auto; padding: 0 14px; }

    /* ── 단계 공통 ── */
    .step-block {
      margin: 18px 0;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .step-head {
      padding: 15px 18px;
      display: flex;
      align-items: center;
      gap: 13px;
    }
    .step-badge {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      font-size: 20px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-title {
      font-size: 20px;
      font-weight: 900;
      line-height: 1.3;
    }
    .step-body { padding: 18px 18px 20px; }

    /* ── 1단계: 이름 입력 (따뜻한 황토색) ── */
    .step1 { background: #fff8e1; border: 2px solid #f9a825; }
    .step1 .step-head { background: #f9a825; color: #3e2000; }
    .step1 .step-badge { color: #3e2000; }

    .name-guide {
      font-size: 17px;
      color: #5d4037;
      margin-bottom: 14px;
      line-height: 1.65;
    }
    .name-input {
      width: 100%;
      padding: 16px 18px;
      font-size: 22px;
      font-weight: 700;
      border: 3px solid #f9a825;
      border-radius: 10px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .name-input:focus {
      border-color: #e65100;
      box-shadow: 0 0 0 4px rgba(230,81,0,0.15);
    }
    .name-input.filled {
      border-color: #2e7d32;
      background: #f1f8e9;
    }
    @keyframes namePulse {
      0%,100% { border-color: #f9a825; }
      50%      { border-color: #e53935; box-shadow: 0 0 0 6px rgba(229,57,53,0.2); }
    }
    .name-input.prompt { animation: namePulse 0.55s ease 3; }
    .name-ok {
      margin-top: 10px;
      font-size: 17px;
      color: #2e7d32;
      font-weight: 700;
      display: none;
    }
    .name-ok.show { display: block; }

    /* ── 2단계: 메뉴 선택 (파란 계열) ── */
    .step2 { background: #e8f4fd; border: 2px solid #1565c0; }
    .step2 .step-head { background: #1565c0; color: #fff; }
    .step2 .step-badge { color: #1565c0; }
    .step2-guide {
      font-size: 16px;
      color: #0d3b6e;
      margin-bottom: 14px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
    }
    .menu-card {
      background: #fff;
      border: 2px solid #90caf9;
      border-radius: 11px;
      padding: 15px 13px 13px;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s;
      position: relative;
    }
    .menu-card:active:not(.disabled) { transform: scale(0.97); }
    .menu-card.in-cart  { border-color: #1565c0; background: #e3f2fd; }
    .menu-card.disabled { opacity: 0.5; cursor: not-allowed; background: #f5f5f5; }
    .menu-card.name-locked { opacity: 0.65; }

    /* 메뉴 카드 순번별 상단 컬러 라인 — 인간적 차별화 */
    .menu-card:nth-child(6n+1) { border-top: 4px solid #f9a825; }
    .menu-card:nth-child(6n+2) { border-top: 4px solid #1565c0; }
    .menu-card:nth-child(6n+3) { border-top: 4px solid #2e7d32; }
    .menu-card:nth-child(6n+4) { border-top: 4px solid #b03a2e; }
    .menu-card:nth-child(6n+5) { border-top: 4px solid #6a1b9a; }
    .menu-card:nth-child(6n+0) { border-top: 4px solid #00838f; }

    .menu-name  { font-size: 18px; font-weight: 800; color: #0d47a1; margin-bottom: 5px; word-break: keep-all; }
    .menu-price { font-size: 20px; font-weight: 900; color: #b03a2e; margin-bottom: 5px; }
    .menu-stock { font-size: 16px; color: #555; }
    .menu-stock.soldout { color: #c62828; font-weight: 700; }

    .qty-ctrl {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 11px;
    }
    .qty-btn {
      width: 40px; height: 40px;
      border: none; border-radius: 8px;
      font-size: 22px; font-weight: 900;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .qty-btn.minus { background: #dde3ea; color: #333; }
    .qty-btn.plus  { background: #1565c0; color: #fff; }
    .qty-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .qty-num { font-size: 22px; font-weight: 900; color: #1565c0; min-width: 26px; text-align: center; }

    .add-btn {
      width: 100%;
      margin-top: 11px;
      padding: 14px 6px;
      border: 2px dashed #90caf9;
      border-radius: 8px;
      background: transparent;
      color: #1565c0;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s;
    }
    .add-btn:hover { background: #e3f2fd; border-style: solid; }

    /* ── 3단계: 장바구니 & 주문 (초록 계열) ── */
    .step3 { background: #e8f5e9; border: 2px solid #2e7d32; }
    .step3 .step-head { background: #2e7d32; color: #fff; }
    .step3 .step-badge { color: #2e7d32; }

    .cart-empty {
      text-align: center;
      padding: 22px 16px;
      font-size: 17px;
      color: #555;
      background: #fff;
      border-radius: 10px;
      border: 2px dashed #a5d6a7;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #c8e6c9;
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 18px; font-weight: 800; }
    .cart-item-sub  { font-size: 16px; color: #555; margin-top: 3px; }
    .cart-qty-wrap  { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .cqb {
      width: 40px; height: 40px;
      border: none; border-radius: 8px;
      font-size: 22px; font-weight: 900; cursor: pointer;
    }
    .cqb.minus { background: #dde3ea; color: #333; }
    .cqb.plus  { background: #2e7d32; color: #fff; }
    .cqb-num   { font-size: 20px; font-weight: 900; min-width: 26px; text-align: center; }

    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0 4px;
      border-top: 2px solid #a5d6a7;
      margin-top: 4px;
    }
    .cart-total-label  { font-size: 19px; font-weight: 700; }
    .cart-total-amount { font-size: 28px; font-weight: 900; color: #b03a2e; }

    .clear-btn {
      background: none; border: none;
      color: #888; font-size: 16px;
      text-decoration: underline;
      cursor: pointer; font-family: inherit; padding: 0; margin-top: 6px;
    }

    /* 주문하기 버튼 — 아주 크고 눈에 띄게 */
    .order-btn {
      width: 100%;
      padding: 20px 16px;
      margin-top: 18px;
      border: none;
      border-radius: 13px;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      background: #b03a2e;
      color: #fff;
      letter-spacing: -0.3px;
      transition: opacity 0.15s, transform 0.12s;
    }
    .order-btn:active:not(:disabled) { transform: scale(0.98); opacity: 0.9; }
    .order-btn:disabled { background: #bdbdbd; color: #fff; cursor: not-allowed; }

    /* ── 4단계: 결제 정보 (보라 계열) ── */
    .step4 { background: #f3e5f5; border: 2px solid #6a1b9a; }
    .step4 .step-head { background: #6a1b9a; color: #fff; }
    .step4 .step-badge { color: #6a1b9a; }

    .pay-bank    { font-size: 16px; color: #5c3566; margin-bottom: 3px; }
    .pay-acct    { font-size: 28px; font-weight: 900; color: #1a1a1a; margin-bottom: 4px; letter-spacing: 0.5px; }
    .pay-owner   { font-size: 17px; color: #5c3566; margin-bottom: 16px; }
    .pay-notice  {
      background: #fff;
      border: 1px solid #ce93d8;
      border-radius: 9px;
      padding: 12px 14px;
      font-size: 16px;
      color: #4a148c;
      margin-bottom: 14px;
      line-height: 1.65;
    }
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 22px;
      border: 2px solid #6a1b9a;
      border-radius: 10px;
      background: #fff;
      color: #6a1b9a;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
    }
    .copy-btn:active { background: #f3e5f5; }

    /* ── 내 주문 현황 ── */
    .my-order-block {
      margin: 18px 0;
      background: #fff;
      border: 3px solid #37474f;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .my-order-head {
      background: #37474f;
      color: #fff;
      padding: 15px 18px;
      font-size: 20px;
      font-weight: 900;
    }
    .my-order-body { padding: 18px; }

    .order-num-big  { font-size: 34px; font-weight: 900; color: #b03a2e; margin-bottom: 5px; }
    .order-time-sm  { font-size: 16px; color: #777; margin-bottom: 16px; }

    /* 상태 큰 표시 */
    .status-box {
      padding: 18px 16px;
      border-radius: 11px;
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .st-주문접수 { background: #f5f5f5; color: #37474f; }
    .st-입금확인 { background: #e3f2fd; color: #1565c0; }
    .st-준비중  { background: #fff3e0; color: #bf360c; }
    .st-준비완료 { background: #e8f5e9; color: #2e7d32; }
    .st-수령완료 { background: #f5f5f5; color: #757575; }
    .st-취소   { background: #fce4ec; color: #c62828; }

    .ahead-box {
      background: #fffde7;
      border: 2px solid #f9a825;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 700;
      color: #4e2800;
      margin-bottom: 14px;
    }

    .order-items {
      font-size: 17px;
      color: #333;
      line-height: 2;
      padding: 14px 0;
      border-top: 1px solid #e0e0e0;
      border-bottom: 1px solid #e0e0e0;
      margin-bottom: 14px;
    }
    .order-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 20px;
      font-weight: 900;
      color: #b03a2e;
      margin-bottom: 16px;
    }

    .act-btns { display: flex; gap: 10px; flex-wrap: wrap; }
    .act-btn {
      padding: 13px 20px;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
    }
    .act-blue { background: #e3f2fd; color: #1565c0; }
    .act-gray { background: #f0f0f0; color: #555; }

    /* ── 알림 박스 ── */
    .notice-ok {
      background: #e8f5e9;
      border: 2px solid #66bb6a;
      border-radius: 10px;
      padding: 16px;
      font-size: 17px;
      color: #1b5e20;
      line-height: 1.7;
      margin-top: 14px;
    }
    .notice-err {
      background: #fce4ec;
      border: 2px solid #ef9a9a;
      border-radius: 10px;
      padding: 16px;
      font-size: 17px;
      color: #880e4f;
      line-height: 1.7;
      margin-top: 14px;
    }

    /* ── 빈 상태 ── */
    .empty-box {
      text-align: center;
      padding: 22px;
      color: #777;
      font-size: 17px;
      background: #fafafa;
      border-radius: 10px;
      border: 2px dashed #ddd;
    }

    /* ── 하단 장바구니 바 ── */
    .cart-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      padding: 14px 18px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      background: #3e2000;
      box-shadow: 0 -3px 16px rgba(0,0,0,0.22);
      display: none;
    }
    .cart-bar.visible { display: block; }
    .cart-bar-inner {
      max-width: 580px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .cart-bar-info   { flex: 1; color: #fff; }
    .cart-bar-count  { font-size: 16px; color: rgba(255,255,255,0.85); }
    .cart-bar-total  { font-size: 20px; font-weight: 900; }
    .cart-bar-btn {
      border: none;
      border-radius: 10px;
      padding: 14px 22px;
      background: #b03a2e;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }

    /* ── 반응형 ── */
    @media (max-width: 360px) {
      body { font-size: 17px; }
      .menu-grid { grid-template-columns: 1fr; }
      .step-title { font-size: 18px; }
      .order-btn { font-size: 20px; padding: 18px 14px; }
    }
    @media (min-width: 520px) {
      .menu-grid { grid-template-columns: 1fr 1fr 1fr; }
    }

    /* ── 진행 스텝 표시 ── */
    .progress-steps {
      display: flex;
      align-items: flex-start;
      margin: 0 0 16px;
    }
    .ps-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      position: relative;
    }
    .ps-item::after {
      content: '';
      position: absolute;
      top: 11px; left: 50%; right: -50%;
      height: 3px;
      background: #ddd;
      z-index: 0;
    }
    .ps-item:last-child::after { display: none; }
    .ps-item.done::after { background: #2e7d32; }
    .ps-dot {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 3px solid #ddd;
      background: #fff;
      z-index: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900;
    }
    .ps-item.done .ps-dot    { background: #2e7d32; border-color: #2e7d32; color: #fff; }
    .ps-item.current .ps-dot { background: #fff; border-color: #b03a2e; border-width: 3px; }
    .ps-label {
      font-size: 14px; color: #888; font-weight: 700;
      text-align: center; white-space: nowrap;
      line-height: 1.3;
    }
    .ps-item.done .ps-label    { color: #2e7d32; }
    .ps-item.current .ps-label { color: #b03a2e; font-weight: 900; }

    /* ── 토스트 알림 ── */
    .toast {
      position: fixed;
      bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,30,30,0.9);
      color: #fff;
      padding: 13px 22px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      z-index: 9000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── 준비완료 팝업 ── */
    .ready-overlay {
      position: fixed;
      inset: 0; z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: readyFlash 0.8s infinite;
    }
    .ready-overlay.show { display: flex; }
    .ready-box {
      width: min(92vw, 580px);
      text-align: center;
      background: rgba(255,255,255,0.16);
      border: 3px solid rgba(255,255,255,0.8);
      border-radius: 22px;
      padding: 38px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .ready-title {
      font-size: clamp(2rem, 8vw, 3.4rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.3;
      word-break: keep-all;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .ready-sub {
      margin-top: 14px;
      font-size: clamp(1rem, 3.5vw, 1.3rem);
      font-weight: 700;
      color: rgba(255,255,255,0.95);
    }
    @keyframes readyFlash {
      0%,100% { background: rgba(176,58,46,0.93); }
      50%      { background: rgba(255,243,176,0.97); }
    }
  </style>
</head>
<body>

  <!-- 토스트 알림 -->
  <div class="toast" id="toast"></div>

  <!-- 준비완료 팝업 -->
  <div class="ready-overlay" id="readyAlertOverlay">
    <div class="ready-box">
      <div class="ready-title">주문하신 물건이<br>준비되었습니다!</div>
      <div class="ready-sub">부스로 와서 물건을 받아가세요</div>
    </div>
  </div>

  <!-- 하단 장바구니 바 -->
  <div class="cart-bar" id="cartBar">
    <div class="cart-bar-inner">
      <div class="cart-bar-info">
        <div class="cart-bar-count" id="cartBarCount">0개 선택</div>
        <div class="cart-bar-total" id="cartBarTotal">0원</div>
      </div>
      <button class="cart-bar-btn" onclick="scrollToCart()">주문하기 ↓</button>
    </div>
  </div>

  <!-- 헤더 -->
  <div class="header">
    <div class="header-title" id="headerBoothName">🛒 바자회 주문</div>
    <div class="header-sub">아래 순서대로 따라하시면 됩니다</div>
  </div>

  <!-- 운영 상태 배너 -->
  <div id="statusBanner" style="display:none;"></div>

  <div class="wrap">

    <!-- 1단계: 이름 입력 -->
    <div class="step-block step1">
      <div class="step-head">
        <div class="step-badge">1</div>
        <div class="step-title">이름을 써주세요</div>
      </div>
      <div class="step-body">
        <div class="name-guide">
          물건을 사시는 분 또는 돈을 보내시는 분 이름을<br>
          <strong>정확하게</strong> 입력해 주세요.
        </div>
        <input type="text" id="customerName" class="name-input"
          placeholder="예) 홍길동" maxlength="20" autocomplete="off" />
        <div class="name-ok" id="nameOkMsg">✅ 이름이 입력되었습니다</div>
      </div>
    </div>

    <!-- 2단계: 메뉴 선택 -->
    <div class="step-block step2">
      <div class="step-head">
        <div class="step-badge">2</div>
        <div class="step-title">원하는 물건을 골라주세요</div>
      </div>
      <div class="step-body">
        <div class="step2-guide">물건을 누르면 장바구니에 담깁니다.</div>
        <div id="menuList" class="menu-grid"></div>
      </div>
    </div>

    <!-- 3단계: 확인 및 주문 -->
    <div class="step-block step3" id="cartSection">
      <div class="step-head">
        <div class="step-badge">3</div>
        <div class="step-title">담은 물건을 확인하고 주문하세요</div>
      </div>
      <div class="step-body">
        <div id="cartItems"></div>
        <div id="cartEmpty" class="cart-empty">2단계에서 물건을 담으면 여기에 표시됩니다</div>
        <div id="cartTotalRow" style="display:none;">
          <div class="cart-total">
            <div class="cart-total-label">합계 금액</div>
            <div class="cart-total-amount" id="totalAmount">0원</div>
          </div>
          <div style="text-align:right; margin-top:5px;">
            <button class="clear-btn" onclick="clearCart()">장바구니 비우기</button>
          </div>
        </div>
        <button class="order-btn" id="submitBtn" onclick="submitOrder()">물건을 먼저 골라주세요</button>
        <div id="orderNotice"></div>
      </div>
    </div>

    <!-- 4단계: 결제 정보 -->
    <div class="step-block step4">
      <div class="step-head">
        <div class="step-badge">4</div>
        <div class="step-title">이 계좌로 결제해 주세요</div>
      </div>
      <div class="step-body">
        <div id="paymentInfo">불러오는 중...</div>
      </div>
    </div>

    <!-- 내 주문 현황 -->
    <div class="my-order-block">
      <div class="my-order-head">📦 내 주문 현황</div>
      <div class="my-order-body">
        <div id="myOrderBox"></div>
      </div>
    </div>

  </div><!-- /wrap -->

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBowzlxR0AZZIe4e0pzoZHmbRLwy_X1_S8",
      authDomain: "l-t-4-19-bazaar.firebaseapp.com",
      databaseURL: "https://l-t-4-19-bazaar-default-rtdb.firebaseio.com",
      projectId: "l-t-4-19-bazaar",
      storageBucket: "l-t-4-19-bazaar.firebasestorage.app",
      messagingSenderId: "878700674440",
      appId: "1:878700674440:web:6a1d94557ea9ba9a798e3d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const params      = new URLSearchParams(location.search);
    const boothId     = params.get("booth")  || "main";
    const boothPrefix = params.get("prefix") || (boothId !== "main" ? boothId.toUpperCase() : "A");

    const MENU_PATH       = `settings/menu/${boothId}`;
    const PAYMENT_PATH    = `settings/payment/${boothId}`;
    const CONTROL_PATH    = `settings/boothControl/${boothId}`;
    const BOOTH_INFO_PATH = `settings/boothInfo/${boothId}`;
    const ORDERS_PATH     = `orders/${boothId}`;
    const COUNTER_PATH    = `settings/orderCounter/${boothId}`;

    const LAST_ORDER_KEY    = `bazaar_last_order_${boothId}`;
    const CUSTOMER_NAME_KEY = `bazaar_customer_name_${boothId}`;
    const READY_ALERT_KEY   = `bazaar_ready_alert_${boothId}`;

    let menuMap      = {};
    let paymentInfo  = {};
    let boothControl = {};
    let orders       = [];
    let cart         = {};
    let myOrderId    = localStorage.getItem(LAST_ORDER_KEY) || "";
    let readyAudioCtx  = null;
    let readyAlertTimer = null;
    let readyBellTimer  = null;

    /* ── 토스트 ── */
    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById("toast");
      if (!el) return;
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 1800);
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }
    function currency(n) { return Number(n || 0).toLocaleString() + "원"; }

    function formatDateTime(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ` +
             `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    /* ── 오디오 ── */
    function initReadyAudio() {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC || readyAudioCtx) return;
      readyAudioCtx = new AC();
    }
    function unlockReadyAudio() {
      initReadyAudio();
      if (readyAudioCtx && readyAudioCtx.state === "suspended")
        readyAudioCtx.resume().catch(() => {});
    }
    ["click","touchstart","keydown"].forEach(evt =>
      document.addEventListener(evt, unlockReadyAudio, { once: true, passive: true })
    );
    function playReadyBell() {
      initReadyAudio();
      if (!readyAudioCtx) return;
      if (readyAudioCtx.state === "suspended") readyAudioCtx.resume().catch(() => {});
      const now   = readyAudioCtx.currentTime;
      const tones = [
        { t: 0.00, f: 1318.51, d: 0.18 },
        { t: 0.20, f: 1567.98, d: 0.18 },
        { t: 0.42, f: 2093.00, d: 0.32 }
      ];
      tones.forEach(({ t, f, d }) => {
        const osc  = readyAudioCtx.createOscillator();
        const gain = readyAudioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(f, now + t);
        gain.gain.setValueAtTime(0.0001, now + t);
        gain.gain.exponentialRampToValueAtTime(0.18, now + t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + t + d);
        osc.connect(gain);
        gain.connect(readyAudioCtx.destination);
        osc.start(now + t);
        osc.stop(now + t + d + 0.02);
      });
    }
    function stopReadyAlert() {
      clearTimeout(readyAlertTimer);
      clearInterval(readyBellTimer);
      readyAlertTimer = null;
      readyBellTimer  = null;
      document.getElementById("readyAlertOverlay").classList.remove("show");
    }
    function startReadyAlert() {
      stopReadyAlert();
      document.getElementById("readyAlertOverlay").classList.add("show");
      playReadyBell();
      readyBellTimer  = setInterval(playReadyBell, 4000);
      readyAlertTimer = setTimeout(stopReadyAlert, 30000);
    }
    function maybeShowReadyAlert() {
      if (!myOrderId) return;
      const myOrder = orders.find(o => o.id === myOrderId);
      if (!myOrder || myOrder.status !== "준비완료") return;
      const token = `${myOrderId}_준비완료_${myOrder.recallAt || 0}`;
      if (localStorage.getItem(READY_ALERT_KEY) === token) return;
      localStorage.setItem(READY_ALERT_KEY, token);
      startReadyAlert();
    }

    /* ── 시간 파싱 ── */
    function parseTimeToMinutes(hhmm) {
      if (!hhmm || !hhmm.includes(":")) return null;
      const [h, m] = hhmm.split(":").map(Number);
      if (Number.isNaN(h) || Number.isNaN(m)) return null;
      return h * 60 + m;
    }
    function currentMinutes() {
      const now = new Date();
      return now.getHours() * 60 + now.getMinutes();
    }

    /* ── 이름 ── */
    function loadCustomerName() {
      const input = document.getElementById("customerName");
      input.value = localStorage.getItem(CUSTOMER_NAME_KEY) || "";
      updateNameStyle();
    }
    function saveCustomerName() {
      localStorage.setItem(CUSTOMER_NAME_KEY, document.getElementById("customerName").value.trim());
      updateNameStyle();
      updateSubmitButtonState();
      renderMenus();
    }
    function updateNameStyle() {
      const input  = document.getElementById("customerName");
      const filled = !!input.value.trim();
      input.classList.toggle("filled", filled);
      const msg = document.getElementById("nameOkMsg");
      if (msg) msg.classList.toggle("show", filled);
    }
    document.getElementById("customerName").addEventListener("input", saveCustomerName);

    /* ── 주문 가능 여부 ── */
    function getOrderAvailability(control = boothControl) {
      const mode = control.mode || "auto";
      if (mode === "open")   return { canOrder: true,  title: "주문 가능",   desc: control.message || "지금 주문하실 수 있습니다." };
      if (mode === "paused") return { canOrder: false, title: "잠시 대기",   desc: control.message || "잠시 후 다시 시도해 주세요." };
      if (mode === "closed") return { canOrder: false, title: "주문 마감",   desc: control.message || "현재 주문을 받지 않습니다." };

      const openMin  = parseTimeToMinutes(control.openAt);
      const closeMin = parseTimeToMinutes(control.closeAt);
      const nowMin   = currentMinutes();

      if (openMin  !== null && nowMin < openMin)  return { canOrder: false, title: `아직 시작 전 (${control.openAt})`,  desc: control.message || "시작 시간 이후 주문 가능합니다." };
      if (closeMin !== null && nowMin >= closeMin) return { canOrder: false, title: `주문 마감 (${control.closeAt})`,    desc: control.message || "주문이 마감되었습니다." };
      return { canOrder: true, title: "주문 가능", desc: control.message || "메뉴를 선택해서 주문해 주세요." };
    }

    /* ── 헤더/배너 ── */
    function renderHeaderStatus() {
      const info     = getOrderAvailability();
      const bannerEl = document.getElementById("statusBanner");
      if (!info.canOrder) {
        const cls = info.title.includes("대기") ? "s-paused" : "s-closed";
        bannerEl.innerHTML = `<div class="status-banner ${cls}">⚠️ ${escapeHtml(info.title)} — ${escapeHtml(info.desc)}</div>`;
        bannerEl.style.display = "block";
      } else {
        bannerEl.style.display = "none";
      }
      updateSubmitButtonState();
    }

    /* ── 결제 정보 ── */
    function renderPaymentInfo() {
      const el = document.getElementById("paymentInfo");
      const bn = paymentInfo.bankName      || "";
      const an = paymentInfo.accountNumber || "";
      const ao = paymentInfo.accountOwner  || paymentInfo.accountHolder || "";
      const nt = paymentInfo.notice        || "";
      if (!bn && !an && !ao) {
        el.innerHTML = `<div class="empty-box">결제 안내가 아직 등록되지 않았습니다.</div>`;
        return;
      }
      const acctText = `${bn} ${an}`;
      el.innerHTML = `
        <div class="pay-bank">${escapeHtml(bn)}</div>
        <div class="pay-acct">${escapeHtml(an)}</div>
        <div class="pay-owner">통장 이름: ${escapeHtml(ao)}</div>
        ${nt ? `<div class="pay-notice">${escapeHtml(nt)}</div>` : ""}
        <button class="copy-btn" onclick="copyText('${escapeHtml(acctText)}')">📋 계좌번호 복사하기</button>
      `;
    }

    function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => alert("복사되었습니다.")).catch(() => fallbackCopyText(text));
      } else {
        fallbackCopyText(text);
      }
    }
    function fallbackCopyText(text) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly","");
      ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
      document.body.appendChild(ta);
      ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length);
      try { document.execCommand("copy") ? alert("복사되었습니다.") : alert("복사에 실패했습니다."); }
      catch { alert("복사에 실패했습니다."); }
      document.body.removeChild(ta);
    }

    /* ── 메뉴 렌더링 ── */
    function getCartQty(menuId) { return Number(cart[menuId] || 0); }

    function renderMenus() {
      const wrap  = document.getElementById("menuList");
      const menus = Object.entries(menuMap)
        .filter(([_, m]) => m && m.active !== false)
        .sort((a, b) => String(a[1].name || "").localeCompare(String(b[1].name || ""), "ko"));

      if (!menus.length) {
        wrap.innerHTML = `<div class="empty-box" style="grid-column:1/-1">현재 주문 가능한 물건이 없습니다.</div>`;
        updateCartDisplay();
        return;
      }

      const canOrder = getOrderAvailability().canOrder;
      const hasName  = !!document.getElementById("customerName").value.trim();

      wrap.innerHTML = menus.map(([key, menu]) => {
        const qty       = getCartQty(key);
        const stock     = Number(menu.stock || 0);
        const soldOut   = stock <= 0;
        const disabled  = soldOut || !canOrder;
        const nameLocked = !hasName && !disabled;
        const inCart    = qty > 0;

        const stockHtml = soldOut
          ? `<div class="menu-stock soldout">품절</div>`
          : (!canOrder
            ? `<div class="menu-stock soldout">주문 불가</div>`
            : `<div class="menu-stock">남은 수량 ${stock}개</div>`);

        let ctrlHtml = "";
        if (!disabled && !nameLocked) {
          if (inCart) {
            ctrlHtml = `
              <div class="qty-ctrl">
                <button class="qty-btn minus" onclick="event.stopPropagation();changeQty('${key}',-1)" ${qty<=0?"disabled":""}>−</button>
                <span class="qty-num">${qty}</span>
                <button class="qty-btn plus"  onclick="event.stopPropagation();changeQty('${key}',1)"  ${qty>=stock?"disabled":""}>+</button>
              </div>`;
          } else {
            ctrlHtml = `<button class="add-btn" onclick="event.stopPropagation();addToCart('${key}')">+ 담기</button>`;
          }
        }

        const clickAttr = nameLocked
          ? `onclick="focusNameInput()"`
          : (!disabled && !inCart ? `onclick="addToCart('${key}')"` : "");

        return `
          <div class="menu-card ${disabled?"disabled":""} ${nameLocked?"name-locked":""} ${inCart?"in-cart":""}" ${clickAttr}>
            <div class="menu-name">${escapeHtml(menu.name)}</div>
            <div class="menu-price">${currency(menu.price)}</div>
            ${stockHtml}
            ${ctrlHtml}
          </div>`;
      }).join("");

      updateCartDisplay();
    }

    function focusNameInput() {
      const input = document.getElementById("customerName");
      input.scrollIntoView({ behavior: "smooth", block: "center" });
      input.focus();
      input.classList.remove("prompt");
      void input.offsetWidth;
      input.classList.add("prompt");
      setTimeout(() => input.classList.remove("prompt"), 1650);
      showToast("👆 먼저 이름을 입력해 주세요");
    }

    function addToCart(menuId) {
      if (!document.getElementById("customerName").value.trim()) { focusNameInput(); return; }
      const info = getOrderAvailability();
      if (!info.canOrder) { alert(info.desc || "현재 주문할 수 없습니다."); return; }
      const menu  = menuMap[menuId];
      if (!menu) return;
      const stock = Number(menu.stock || 0);
      if (stock <= 0) { alert("품절입니다."); return; }
      const cur = getCartQty(menuId);
      if (cur >= stock) { showToast("더 담을 수 없어요. 남은 수량만큼만 가능합니다."); return; }
      cart[menuId] = cur + 1;
      showToast(`✅ ${menu.name} 담겼습니다`);
      renderMenus();
    }

    function changeQty(menuId, delta) {
      const menu  = menuMap[menuId];
      if (!menu) return;
      const cur   = getCartQty(menuId);
      const next  = cur + delta;
      const stock = Number(menu.stock || 0);
      if (next < 0) return;
      if (next > stock) { showToast("더 담을 수 없어요. 남은 수량보다 많습니다."); return; }
      if (next === 0) delete cart[menuId];
      else cart[menuId] = next;
      renderMenus();
    }

    function clearCart() { cart = {}; renderMenus(); }
    function scrollToCart() { document.getElementById("cartSection").scrollIntoView({ behavior: "smooth" }); }

    function getCartItems() {
      return Object.entries(cart)
        .filter(([_, qty]) => Number(qty) > 0)
        .map(([menuId, qty]) => {
          const menu = menuMap[menuId];
          if (!menu) return null;
          return { menuId, name: menu.name, price: Number(menu.price || 0), qty: Number(qty), amount: Number(menu.price || 0) * Number(qty) };
        }).filter(Boolean);
    }

    /* ── 장바구니 화면 ── */
    function updateCartDisplay() {
      const items      = getCartItems();
      const itemsEl    = document.getElementById("cartItems");
      const emptyEl    = document.getElementById("cartEmpty");
      const totalRowEl = document.getElementById("cartTotalRow");
      const cartBarEl  = document.getElementById("cartBar");

      if (!items.length) {
        itemsEl.innerHTML = "";
        emptyEl.style.display  = "block";
        totalRowEl.style.display = "none";
        cartBarEl.classList.remove("visible");
        updateSubmitButtonState();
        return;
      }

      emptyEl.style.display    = "none";
      totalRowEl.style.display = "block";
      cartBarEl.classList.add("visible");

      let total = 0, totalQty = 0;
      itemsEl.innerHTML = items.map(item => {
        total    += item.amount;
        totalQty += item.qty;
        return `
          <div class="cart-item">
            <div class="cart-item-info">
              <div class="cart-item-name">${escapeHtml(item.name)}</div>
              <div class="cart-item-sub">${currency(item.price)} × ${item.qty}개 = ${currency(item.amount)}</div>
            </div>
            <div class="cart-qty-wrap">
              <button class="cqb minus" onclick="changeQty('${item.menuId}',-1)">−</button>
              <span class="cqb-num">${item.qty}</span>
              <button class="cqb plus"  onclick="changeQty('${item.menuId}',1)">+</button>
            </div>
          </div>`;
      }).join("");

      document.getElementById("totalAmount").innerText  = currency(total);
      document.getElementById("cartBarCount").innerText = `${totalQty}개 선택`;
      document.getElementById("cartBarTotal").innerText = currency(total);
      updateSubmitButtonState();
    }

    /* ── 주문 버튼 상태 ── */
    function updateSubmitButtonState() {
      const info     = getOrderAvailability();
      const hasName  = document.getElementById("customerName").value.trim();
      const totalQty = getCartItems().reduce((s, i) => s + i.qty, 0);
      const btn      = document.getElementById("submitBtn");
      if (!btn) return;
      const canSubmit = info.canOrder && !!hasName && totalQty > 0;
      btn.disabled = !canSubmit;
      if (!info.canOrder)   btn.innerText = "현재 주문을 받지 않습니다";
      else if (!hasName)    btn.innerText = "1단계: 이름을 먼저 입력해 주세요";
      else if (totalQty <= 0) btn.innerText = "2단계: 물건을 먼저 골라주세요";
      else                  btn.innerText  = "✅ 주문하기";
    }

    /* ── 주문 현황 ── */
    const STATUS_STEPS_LIST = ["주문접수","입금확인","준비중","준비완료","수령완료"];
    const STATUS_STEPS_KR   = ["주문\n접수","입금\n확인","준비\n중","준비\n완료","수령\n완료"];

    function renderProgressSteps(status) {
      if (status === "취소") return `<div style="text-align:center;padding:10px 0;font-size:18px;color:#c62828;font-weight:900;">❌ 주문이 취소되었습니다</div>`;
      const cur = STATUS_STEPS_LIST.indexOf(status);
      return `<div class="progress-steps">` +
        STATUS_STEPS_LIST.map((s, i) => {
          const cls = i < cur ? "done" : i === cur ? "current" : "";
          const dot = i < cur ? "✓" : String(i + 1);
          const lbl = STATUS_STEPS_KR[i].replace("\n", "<br>");
          return `<div class="ps-item ${cls}"><div class="ps-dot">${dot}</div><div class="ps-label">${lbl}</div></div>`;
        }).join("") +
        `</div>`;
    }

    const STATUS_LABEL = {
      "주문접수": "주문이 접수되었습니다",
      "입금확인": "입금을 확인했습니다",
      "준비중":   "물건을 준비하고 있습니다",
      "준비완료": "물건 준비가 완료되었습니다!",
      "수령완료": "수령이 완료되었습니다",
      "취소":    "주문이 취소되었습니다"
    };

    function renderMyOrder() {
      const wrap = document.getElementById("myOrderBox");
      if (!myOrderId) {
        wrap.innerHTML = `<div class="empty-box">이 기기에서 주문한 내역이 없습니다.</div>`;
        return;
      }
      const myOrder = orders.find(o => o.id === myOrderId);
      if (!myOrder) {
        wrap.innerHTML = `
          <div class="empty-box">주문을 찾을 수 없습니다. 다른 기기에서 주문하셨거나 초기화된 것일 수 있습니다.</div>
          <div style="margin-top:12px">
            <button class="act-btn act-gray" onclick="clearMyOrder()">내 주문 기록 지우기</button>
          </div>`;
        return;
      }

      const activeStatuses = ["주문접수","입금확인","준비중","준비완료"];
      const ahead = orders.filter(o =>
        activeStatuses.includes(o.status) &&
        Number(o.queueNumber) < Number(myOrder.queueNumber)
      ).length;

      const isReady    = myOrder.status === "준비완료";
      const itemsHtml  = (myOrder.items || []).map(item => `<div>• ${escapeHtml(item.name)} ${item.qty}개</div>`).join("");
      const stCls      = `st-${myOrder.status}`;
      const stLabel    = STATUS_LABEL[myOrder.status] || myOrder.status;

      wrap.innerHTML = `
        <div>
          <div class="order-num-big">${escapeHtml(myOrder.orderNumber || "-")}</div>
          <div class="order-time-sm">${escapeHtml(myOrder.createdAtText || formatDateTime(myOrder.createdAt))}</div>
          <div class="status-box ${stCls}">${stLabel}</div>
          ${renderProgressSteps(myOrder.status)}
          ${!["수령완료","취소"].includes(myOrder.status)
            ? `<div class="ahead-box">⏳ 내 앞에 대기 중인 주문: <strong>${ahead}건</strong></div>` : ""}
          <div class="order-items">${itemsHtml}</div>
          <div class="order-total-row"><span>합계</span><span>${currency(myOrder.totalAmount)}</span></div>
          <div class="act-btns">
            <button class="act-btn act-blue" onclick="copyText('${escapeHtml(myOrder.orderNumber||"")}')">주문번호 복사</button>
            <button class="act-btn act-gray" onclick="clearMyOrder()">기록 지우기</button>
          </div>
        </div>`;
    }

    function clearMyOrder() {
      localStorage.removeItem(LAST_ORDER_KEY);
      myOrderId = "";
      stopReadyAlert();
      renderMyOrder();
    }

    /* ── Firebase 트랜잭션 ── */
    async function getNextQueueNumber() {
      const ref    = db.ref(COUNTER_PATH);
      const result = await ref.transaction(current => Number(current || 0) + 1);
      if (!result.committed) throw new Error("번호 발급 실패");
      return Number(result.snapshot.val());
    }

    async function reserveStock(items) {
      const reserved = [];
      try {
        for (const item of items) {
          const ref      = db.ref(`${MENU_PATH}/${item.menuId}`);
          const txResult = await ref.transaction(current => {
            if (current == null) return current;
            const currentStock = Number(current.stock || 0);
            if (current.active === false) return;
            if (currentStock < item.qty) return;
            current.stock = currentStock - Number(item.qty || 0);
            return current;
          });
          if (!txResult.committed) throw new Error(`${item.name} 재고가 부족하거나 주문할 수 없습니다.`);
          reserved.push(item);
        }
        return true;
      } catch (error) {
        for (const item of reserved) {
          const rollbackRef = db.ref(`${MENU_PATH}/${item.menuId}`);
          await rollbackRef.transaction(current => {
            if (current == null) return current;
            current.stock = Number(current.stock || 0) + Number(item.qty || 0);
            return current;
          });
        }
        throw error;
      }
    }

    /* ── 주문 제출 ── */
    async function submitOrder() {
      const availability = getOrderAvailability();
      if (!availability.canOrder) { alert(availability.desc || "현재 주문할 수 없습니다."); return; }

      const customerName = document.getElementById("customerName").value.trim();
      if (!customerName) {
        alert("이름을 입력해 주세요.");
        document.getElementById("customerName").focus();
        return;
      }

      const items = getCartItems();
      if (!items.length) { alert("물건을 1개 이상 담아주세요."); return; }

      const totalAmount = items.reduce((s, i) => s + i.amount, 0);
      const submitBtn   = document.getElementById("submitBtn");
      const notice      = document.getElementById("orderNotice");

      submitBtn.disabled  = true;
      submitBtn.innerText = "주문 처리 중...";
      notice.innerHTML    = "";

      try {
        await reserveStock(items);

        const queueNumber   = await getNextQueueNumber();
        const orderNumber   = `${boothPrefix}-${String(queueNumber).padStart(3, "0")}`;
        const createdAt     = Date.now();
        const createdAtText = formatDateTime(createdAt);

        const newOrderRef = db.ref(ORDERS_PATH).push();
        await newOrderRef.set({
          boothId, orderNumber, queueNumber, customerName,
          items, totalAmount, status: "주문접수", createdAt, createdAtText
        });

        myOrderId = newOrderRef.key;
        localStorage.setItem(LAST_ORDER_KEY, myOrderId);

        cart = {};
        renderMenus();
        renderMyOrder();

        notice.innerHTML = `
          <div class="notice-ok">
            ✅ 주문이 완료되었습니다!<br/>
            <strong>주문번호: ${escapeHtml(orderNumber)}</strong><br/>
            결제 후 아래에서 상태를 확인해 주세요.
          </div>`;

        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      } catch (error) {
        notice.innerHTML = `<div class="notice-err">⚠️ 주문 중 오류가 발생했습니다.<br/>${escapeHtml(error.message || "잠시 후 다시 시도해 주세요.")}</div>`;
      } finally {
        updateSubmitButtonState();
      }
    }

    /* ── Firebase 리스너 ── */
    function listenBoothInfo() {
      db.ref(BOOTH_INFO_PATH).on("value", snap => {
        const info = snap.val() || {};
        if (info.displayName) {
          document.getElementById("headerBoothName").textContent = "🛒 " + info.displayName;
          document.title = info.displayName + " - 주문하기";
        }
      });
    }
    function listenMenus() {
      db.ref(MENU_PATH).on("value", snap => {
        menuMap = snap.val() || {};
        Object.keys(cart).forEach(menuId => {
          const menu = menuMap[menuId];
          if (!menu || menu.active === false || Number(menu.stock || 0) <= 0) { delete cart[menuId]; return; }
          if (Number(cart[menuId] || 0) > Number(menu.stock || 0)) {
            cart[menuId] = Number(menu.stock || 0);
            if (cart[menuId] <= 0) delete cart[menuId];
          }
        });
        renderMenus();
      });
    }
    function listenPayment() {
      db.ref(PAYMENT_PATH).on("value", snap => {
        paymentInfo = snap.val() || {};
        renderPaymentInfo();
      });
    }
    function listenControl() {
      db.ref(CONTROL_PATH).on("value", snap => {
        boothControl = snap.val() || {};
        renderHeaderStatus();
      });
    }
    function listenOrders() {
      db.ref(ORDERS_PATH).on("value", snap => {
        const raw = snap.val() || {};
        orders = Object.keys(raw).map(id => ({ id, ...raw[id] }));
        renderMyOrder();
        const myOrder = myOrderId ? orders.find(o => o.id === myOrderId) : null;
        if (myOrder && myOrder.status === "준비완료") maybeShowReadyAlert();
        else stopReadyAlert();
      });
    }

    /* ── 초기화 ── */
    loadCustomerName();
    updateCartDisplay();
    renderHeaderStatus();
    listenBoothInfo();
    listenMenus();
    listenPayment();
    listenControl();
    listenOrders();
  </script>
</body>
</html>
